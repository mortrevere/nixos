<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>links.house</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #1f1626;
        --surface: #271d30;
        --surface-soft: #33243f;
        --text: #d9faff;
        --muted: #9ec7ce;
        --selected: #883cdc;
        --selected-text: #fff8dd;
        --accent: #d94085;
        --success: #2ab250;
        --border: #d9408555;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--background);
        color: var(--text);
        font-family: "Iosevka Term", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 16px;
        line-height: 1.5;
      }

      main {
        width: min(100% - 2rem, 920px);
        margin: 0 auto;
        padding: 4rem 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
      }

      h1 {
        margin: 0;
        color: var(--selected-text);
        font-size: 1.35rem;
        font-weight: 600;
        letter-spacing: 0;
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 0.85rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      section + section {
        margin-top: 2rem;
      }

      h2 {
        margin: 0 0 0.6rem;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
      }

      .card a {
        position: relative;
        display: block;
        padding: 1rem 2.1rem 1rem 1rem;
        color: var(--text);
        text-decoration: none;
      }

      .card a:hover,
      .card a:focus-visible {
        outline: none;
        background: var(--surface-soft);
        color: var(--selected-text);
      }

      .service {
        display: block;
        overflow-wrap: anywhere;
        padding-right: 0;
        font-weight: 600;
      }

      .status {
        position: absolute;
        right: 0.75rem;
        bottom: 0.75rem;
        width: 0.65rem;
        height: 0.65rem;
        overflow: hidden;
        border: 0;
        border-radius: 50%;
        background: var(--success);
        color: transparent;
        font-size: 0;
      }

      .status[data-state="pending"] {
        background: var(--muted);
      }

      .status[data-state="error"] {
        background: var(--accent);
      }

      @media (max-width: 560px) {
        main {
          width: min(100% - 1rem, 920px);
          padding: 1rem 0;
        }

        header {
          display: block;
        }

        .meta {
          margin-top: 0.2rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>links.house</h1>
        <p class="meta">home services</p>
      </header>

      <section aria-labelledby="services-heading">
        <h2 id="services-heading">Services</h2>
        <ul class="grid">
          <li class="card" data-probe="/probe/hyperion">
            <a href="http://hyperion.house/">
              <span class="service">hyperion.house</span>
              <output class="status" data-state="pending" title="checking"></output>
            </a>
          </li>
          <li class="card" data-probe="/probe/cinema">
            <a href="http://cinema.house/">
              <span class="service">cinema.house</span>
              <output class="status" data-state="pending" title="checking"></output>
            </a>
          </li>
          <li class="card" data-probe="/probe/nabu">
            <a href="http://nabu.house/">
              <span class="service">nabu.house</span>
              <output class="status" data-state="pending" title="checking"></output>
            </a>
          </li>
        </ul>
      </section>

      <section aria-labelledby="support-heading">
        <h2 id="support-heading">Support</h2>
        <ul class="grid">
          <li class="card" data-probe="/probe/docker">
            <a href="http://docker.house/">
              <span class="service">docker.house</span>
              <output class="status" data-state="pending" title="checking"></output>
            </a>
          </li>
          <li class="card" data-probe="/probe/grafana">
            <a href="http://grafana.house/">
              <span class="service">grafana.house</span>
              <output class="status" data-state="pending" title="checking"></output>
            </a>
          </li>
          <li class="card" data-probe="/probe/prometheus">
            <a href="http://prometheus.house/">
              <span class="service">prometheus.house</span>
              <output class="status" data-state="pending" title="checking"></output>
            </a>
          </li>
          <li class="card" data-probe="/probe/transmission">
            <a href="http://transmission.house/">
              <span class="service">transmission.house</span>
              <output class="status" data-state="pending" title="checking"></output>
            </a>
          </li>
        </ul>
      </section>
    </main>

    <script>
      (() => {
        const probe = async (card) => {
          const status = card.querySelector(".status");

          try {
            const response = await fetch(card.dataset.probe, {
              method: "HEAD",
              cache: "no-store",
            });
            const probeStatus = response.headers.get("X-Probe-Status");
            const code = probeStatus ? Number(probeStatus) : response.status;
            status.value = `${code}`;
            status.title = `${code}`;
            status.dataset.state = code >= 400 ? "error" : "ok";
          } catch {
            status.value = "";
            status.title = "probe failed";
            status.dataset.state = "error";
          }
        };

        const refresh = () => {
          document.querySelectorAll(".card[data-probe]").forEach(probe);
        };

        const start = () => {
          refresh();
          setInterval(refresh, 10000);
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", start, { once: true });
        } else {
          start();
        }
      })();
    </script>
  </body>
</html>
